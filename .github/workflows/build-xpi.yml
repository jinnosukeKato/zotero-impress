name: Build XPI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build XPI
        run: make clean xpi

      - name: Upload XPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-impress-xpi
          path: zotero-impress-dev.xpi
          if-no-files-found: error
